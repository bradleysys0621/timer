<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位倒數計時器</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #343a40;
            --accent-color: #007bff;
            --pause-color: #ffc107;
            --danger-color: #dc3545;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 1rem;
            border-radius: 1rem;
            box-shadow: var(--shadow);
            text-align: center;
            width: 95%;
            max-width: 400px;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-weight: 300;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 0.5rem;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        label {
            font-size: 0.75rem;
            color: #6c757d;
        }

        input[type="number"] {
            padding: 0.3rem;
            border: 1px solid #ced4da;
            border-radius: 0.3rem;
            font-size: 0.85rem;
            text-align: center;
            width: 60px;
        }

        .controls {
            display: flex;
            gap: 0.4rem;
            justify-content: center;
            margin-bottom: 0.8rem;
        }

        button {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 0.3rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        #startBtn {
            background-color: var(--accent-color);
            color: white;
            flex: 2;
        }

        #startBtn.paused {
            background-color: var(--pause-color);
            color: #212529;
        }

        #resetBtn {
            background-color: #6c757d;
            color: white;
            flex: 1;
        }

        #startBtn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .timer-display {
            font-family: 'Share Tech Mono', monospace;
            font-size: 8rem;
            line-height: 0.9;
            background: #e9ecef;
            padding: 1rem 0;
            border-radius: 0.5rem;
            color: #212529;
            margin-top: 0.2rem;
            border: 2px solid #dee2e6;
        }

        .error-message {
            color: var(--danger-color);
            font-size: 0.75rem;
            margin-top: 0.2rem;
            height: 1rem;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .timer-running {
            color: var(--accent-color);
        }

        .timer-paused {
            color: var(--pause-color);
        }

        .timer-finished {
            color: var(--danger-color);
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>倒數計時器</h1>
        
        <div class="input-group">
            <label for="minutesInput">輸入分鐘 (1-100)</label>
            <input type="number" id="minutesInput" min="1" max="100" value="1" placeholder="分鐘">
            <div id="errorMsg" class="error-message"></div>
        </div>

        <div class="controls">
            <button id="startBtn">開始</button>
            <button id="resetBtn">重設</button>
        </div>

        <div class="timer-display" id="timerDisplay">00:00</div>
    </div>

    <script>
        let countdown;
        let timeLeft;
        let isRunning = false;
        let isPaused = false;

        const minutesInput = document.getElementById('minutesInput');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const errorMsg = document.getElementById('errorMsg');

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            const display = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            timerDisplay.textContent = display;
            document.title = `${display} - 計時器`;
        }

        function runTimer() {
            countdown = setInterval(() => {
                timeLeft--;
                updateDisplay(timeLeft);

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    isRunning = false;
                    isPaused = false;
                    startBtn.textContent = '開始';
                    startBtn.classList.remove('paused');
                    minutesInput.disabled = false;
                    timerDisplay.classList.remove('timer-running', 'timer-paused');
                    timerDisplay.classList.add('timer-finished');
                    alert('時間到！');
                }
            }, 1000);
        }

        function handleStartPause() {
            if (!isRunning && !isPaused) {
                // Initial Start
                const mins = parseInt(minutesInput.value);
                if (isNaN(mins) || mins < 1 || mins > 100) {
                    errorMsg.textContent = '請輸入 1 到 100 之間的分鐘數';
                    return;
                }
                errorMsg.textContent = '';
                timeLeft = mins * 60;
                isRunning = true;
                minutesInput.disabled = true;
                timerDisplay.classList.add('timer-running');
                timerDisplay.classList.remove('timer-finished', 'timer-paused');
                startBtn.textContent = '暫停';
                startBtn.classList.add('paused');
                updateDisplay(timeLeft);
                runTimer();
            } else if (isRunning && !isPaused) {
                // Pause
                clearInterval(countdown);
                isPaused = true;
                isRunning = false;
                startBtn.textContent = '繼續';
                startBtn.classList.remove('paused');
                timerDisplay.classList.remove('timer-running');
                timerDisplay.classList.add('timer-paused');
            } else if (!isRunning && isPaused) {
                // Resume
                isRunning = true;
                isPaused = false;
                startBtn.textContent = '暫停';
                startBtn.classList.add('paused');
                timerDisplay.classList.remove('timer-paused');
                timerDisplay.classList.add('timer-running');
                runTimer();
            }
        }

        function resetTimer() {
            clearInterval(countdown);
            isRunning = false;
            isPaused = false;
            timeLeft = 0;
            updateDisplay(0);
            
            startBtn.textContent = '開始';
            startBtn.classList.remove('paused');
            minutesInput.disabled = false;
            timerDisplay.classList.remove('timer-running', 'timer-paused', 'timer-finished');
            errorMsg.textContent = '';
            document.title = '數位倒數計時器';
        }

        startBtn.addEventListener('click', handleStartPause);
        resetBtn.addEventListener('click', resetTimer);

        minutesInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!isRunning && !isPaused) handleStartPause();
            }
        });
    </script>
</body>
</html>
