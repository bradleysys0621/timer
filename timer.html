<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計時及輕音樂</title>
    <!-- 引入 Google Fonts 的書法/藝術字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            /* 淺色圓點/網格花紋背景 */
            background-image: 
                radial-gradient(#cdd3d8 2px, transparent 2px),
                radial-gradient(#cdd3d8 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            color: #333;
            overflow: hidden; /* 防止出現滾動條 */
        }

        .container {
            background-color: rgba(255, 255, 255, 0.92);
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            text-align: center;
            width: 95%;
            max-width: 900px;
            max-height: 95vh; /* 確保不超過視窗 */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            margin: 0 0 0.25rem 0;
            color: #1a237e;
            font-size: 2.5rem; /* 縮小標題 */
            font-family: 'Ma Shan Zheng', 'DFKai-SB', 'BiauKai', 'LiSu', cursive;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            white-space: nowrap;
        }

        hr {
            border: 0;
            height: 2px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(26, 35, 126, 0.75), rgba(0, 0, 0, 0));
            margin-bottom: 0.5rem;
        }

        .input-group {
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        input[type="number"], button {
            padding: 8px 16px;
            font-size: 1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="number"] {
            border: 2px solid #1a237e;
            background-color: white;
            width: 80px;
            text-align: center;
        }

        /* 將時鐘和按鈕包裝在同一行 */
        .timer-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 0.5rem 0;
        }

        .timer-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 6rem; /* 縮小計時器字體 */
            font-weight: bold;
            margin: 0;
            padding: 0.5rem 2rem;
            background-color: #ffffff;
            color: #000080;
            border-radius: 15px;
            border: 4px solid #1a237e;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }

        .controls-side {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .controls-side button {
            width: 120px;
            padding: 12px 16px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .btn-start { background-color: #2ecc71; color: white; }
        .btn-start:hover { background-color: #27ae60; }
        .btn-start:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .btn-pause { background-color: #f1c40f; color: white; }
        .btn-pause:hover { background-color: #f39c12; }

        .btn-reset { background-color: #e74c3c; color: white; }
        .btn-reset:hover { background-color: #c0392b; }

        .hidden { display: none !important; }

        /* Music Section Styles */
        .music-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed #cdd3d8;
        }

        .music-title {
            color: #1a237e;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .song-tags {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .song-btn {
            background-color: #e0e6ed;
            color: #333;
            border: 2px solid transparent;
            border-radius: 25px;
            padding: 6px 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .song-btn:hover {
            background-color: #d1d8e0;
        }

        .song-btn.active {
            background-color: #1a237e;
            color: white;
            border-color: #1a237e;
            box-shadow: 0 2px 8px rgba(26,35,126,0.3);
        }

        .player-controls {
            background-color: #f8f9fa;
            border-radius: 15px;
            padding: 1rem 1.5rem;
            display: inline-block;
            width: 95%;
            max-width: 500px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .current-song {
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #555;
            font-size: 1rem;
        }

        /* 進度條容器 */
        .progress-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #555;
            font-family: monospace;
        }

        #progress-bar {
            flex-grow: 1;
            cursor: pointer;
            height: 6px;
        }

        .playback-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 0.5rem;
        }

        .btn-control {
            background-color: #34495e;
            color: white;
            padding: 6px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .btn-control:hover { background-color: #2c3e50; }

        .btn-stop { background-color: #e74c3c; }
        .btn-stop:hover { background-color: #c0392b; }

        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
            color: #333;
            font-size: 0.9rem;
        }

        input[type="range"] {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>富貴人生十堂課下課休息</h1>
        <hr>
        
        <div class="input-group">
            <label for="minutes-input">設定分鐘 (1-100): </label>
            <input type="number" id="minutes-input" min="1" max="100" value="10">
        </div>

        <div class="timer-wrapper">
            <div class="timer-display" id="display">00:00</div>
            <div class="controls-side">
                <button id="start-btn" class="btn-start">開始倒數</button>
                <button id="pause-btn" class="btn-pause hidden">暫停計時</button>
                <button id="resume-btn" class="btn-start hidden">繼續計時</button>
                <button id="reset-btn" class="btn-reset">重置計時</button>
            </div>
        </div>

        <!-- Music Section -->
        <div class="music-section">
            <div class="music-title">🎵 輕音樂播放</div>
            
            <div class="song-tags">
                <button class="song-btn" data-src="sakura.mp3">櫻花雪</button>
                <button class="song-btn" data-src="flower.mp3">夢蓮花</button>
                <button class="song-btn" data-src="moom.mp3">清涼月光</button>
            </div>
            
            <div class="player-controls">
                <div class="current-song" id="current-song-display">尚未選擇音樂</div>
                <!-- 隱藏的 audio 元素，由 JavaScript 控制 -->
                <audio id="audio-player" src=""></audio>
                
                <div class="progress-container">
                    <span id="current-time">00:00</span>
                    <input type="range" id="progress-bar" min="0" value="0" step="1">
                    <span id="duration-time">00:00</span>
                </div>
                
                <div class="playback-controls">
                    <button class="btn-control" id="btn-play-pause">▶️ 播放 / 暫停</button>
                    <button class="btn-control btn-stop" id="btn-stop">⏹️ 停止</button>
                </div>
                
                <div class="volume-control">
                    <label for="volume-slider">🔉 音量:</label>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5">
                </div>
            </div>
        </div>
    </div>

    <script>
        // === Timer Logic ===
        const minutesInput = document.getElementById('minutes-input');
        const display = document.getElementById('display');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resumeBtn = document.getElementById('resume-btn');
        const resetBtn = document.getElementById('reset-btn');

        let countdown;
        let timeLeft;
        let isPaused = false;

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (!timeLeft) {
                let val = parseInt(minutesInput.value);
                if (isNaN(val) || val < 1) val = 1;
                if (val > 100) val = 100;
                minutesInput.value = val;
                timeLeft = val * 60;
            }
            
            updateDisplay(timeLeft);
            
            countdown = setInterval(() => {
                timeLeft--;
                updateDisplay(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    alert('休息時間結束！');
                    resetTimer();
                }
            }, 1000);

            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            resumeBtn.classList.add('hidden');
            minutesInput.disabled = true;
        }

        function pauseTimer() {
            clearInterval(countdown);
            isPaused = true;
            pauseBtn.classList.add('hidden');
            resumeBtn.classList.remove('hidden');
        }

        function resumeTimer() {
            startTimer();
            isPaused = false;
        }

        function resetTimer() {
            clearInterval(countdown);
            timeLeft = null;
            isPaused = false;
            updateDisplay(0);
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            resumeBtn.classList.add('hidden');
            minutesInput.disabled = false;
            display.textContent = "00:00";
        }

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resumeBtn.addEventListener('click', resumeTimer);
        resetBtn.addEventListener('click', resetTimer);

        // Initialize display
        updateDisplay(0);

        // === Music Player Logic ===
        const audioPlayer = document.getElementById('audio-player');
        const songBtns = document.querySelectorAll('.song-btn');
        const btnPlayPause = document.getElementById('btn-play-pause');
        const btnStop = document.getElementById('btn-stop');
        const volumeSlider = document.getElementById('volume-slider');
        const currentSongDisplay = document.getElementById('current-song-display');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationTimeDisplay = document.getElementById('duration-time');

        // 音量初始化設定
        audioPlayer.volume = volumeSlider.value;

        // 格式化時間 (秒 -> MM:SS)
        function formatAudioTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // 歌曲選擇
        songBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 更新按鈕樣式
                songBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // 讀取並播放音樂
                const src = btn.getAttribute('data-src');
                const songName = btn.textContent;
                
                audioPlayer.src = src;
                audioPlayer.play().then(() => {
                    btnPlayPause.textContent = '⏸️ 暫停';
                }).catch(err => {
                    console.log('自動播放被阻擋或檔案路徑有誤:', err);
                });
                
                currentSongDisplay.textContent = `現正播放: ${songName}`;
            });
        });

        // 當音樂載入元資料時，設定進度條最大值與總時間
        audioPlayer.addEventListener('loadedmetadata', () => {
            progressBar.max = audioPlayer.duration;
            durationTimeDisplay.textContent = formatAudioTime(audioPlayer.duration);
        });

        // 音樂播放時，更新進度條與當前時間
        audioPlayer.addEventListener('timeupdate', () => {
            progressBar.value = audioPlayer.currentTime;
            currentTimeDisplay.textContent = formatAudioTime(audioPlayer.currentTime);
        });

        // 拖動進度條時跳轉音樂進度
        progressBar.addEventListener('input', () => {
            audioPlayer.currentTime = progressBar.value;
        });

        // 播放與暫停
        btnPlayPause.addEventListener('click', () => {
            // 如果還沒選擇任何歌曲，不執行動作
            if (!audioPlayer.src || audioPlayer.src.endsWith(window.location.pathname)) {
                alert('請先選擇一首輕音樂！');
                return;
            }
            
            if (audioPlayer.paused) {
                audioPlayer.play();
                btnPlayPause.textContent = '⏸️ 暫停';
            } else {
                audioPlayer.pause();
                btnPlayPause.textContent = '▶️ 播放 / 暫停';
            }
        });

        // 停止音樂
        btnStop.addEventListener('click', () => {
            if (audioPlayer.src) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                btnPlayPause.textContent = '▶️ 播放 / 暫停';
            }
        });

        // 音量控制
        volumeSlider.addEventListener('input', (e) => {
            audioPlayer.volume = e.target.value;
        });
        
        // 音樂結束時重置播放按鈕
        audioPlayer.addEventListener('ended', () => {
            btnPlayPause.textContent = '▶️ 播放 / 暫停';
            audioPlayer.currentTime = 0;
        });
    </script>
</body>
</html>
